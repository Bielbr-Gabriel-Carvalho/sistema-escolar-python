{% extends "base.html" %}
{% block titulo %}Nova disciplina{% endblock %}

{% block conteudo %}
<div class="page-header">
  <div class="page-header__text">
    <span class="eyebrow">Módulo 04 · Disciplinas</span>
    <h1>Nova disciplina</h1>
    <p>Cadastre uma disciplina do currículo acadêmico, definindo carga horária, período e (opcionalmente) o professor responsável.</p>
  </div>
  <div class="page-header__actions">
    <a href="{{ url_for('listar_disciplinas') }}" class="btn btn--ghost">Voltar</a>
  </div>
</div>

<div class="form-card">
  <form method="post">
    <div class="form-grid">
      <div class="field">
        <label for="codigo">Código</label>
        <input type="text" id="codigo" name="codigo" required placeholder="ex.: ENG101">
      </div>
      <div class="field">
        <label for="carga_horaria">Carga horária (horas)</label>
        <input type="number" id="carga_horaria" name="carga_horaria" min="1" required>
      </div>

      <div class="field field--full">
        <label for="nome">Nome da disciplina</label>
        <input type="text" id="nome" name="nome" required placeholder="ex.: Engenharia de Requisitos">
      </div>

      <div class="field">
        <label for="periodo">Período</label>
        <input type="number" id="periodo" name="periodo" min="1" required>
      </div>

      <div class="field">
        <label for="professor_responsavel">Professor responsável</label>
        <select id="professor_responsavel" name="professor_responsavel">
          <option value="">— sem professor —</option>
          {% for professor in professores %}
            <option value="{{ professor.codigo_funcional }}">{{ professor.codigo_funcional }} — {{ professor.nome }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn">Cadastrar disciplina</button>
      <a href="{{ url_for('listar_disciplinas') }}" class="btn btn--ghost">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
